# Task-G Rollout App Registry
#
# Port formula (docker-run apps): BASE_PORT + slot_id * slot_offset + app_index
# Default: 30000 + slot_id * 20 + app_index
#
# Container naming: rollout_{slot_id}_{app_name}
#
# Fields:
#   app_index            : unique offset within a slot block (0-indexed)
#   fixed_port           : port used in no-isolation mode
#   container_port       : port the service listens on inside the container
#   start                : docker run command; {container}, {port}, {hostname} substituted
#   health_path          : URL path used by readiness probe; accepts 200/301/302/303/401/403
#   startup_wait         : MAX seconds to wait for readiness; raises if not ready in time
#   start_type: compose  : uses compose_template_file instead of docker run
#   compose_template_file: path to .yml.tpl; $prefix, $port, $hostname substituted
#   compose_volumes      : named volume suffixes to remove on stop

apps:

  # -- Software Engineering & Project Management ----------------------------

  code-server:
    app_index: 0
    fixed_port: 6041
    container_port: 8080
    start: >-
      docker run -d --name {container}
      -e PASSWORD=8a128206e2177bce1e48e565 -u 0
      -p {port}:8080
      code-server-bundle:latest
    health_path: "/"
    startup_wait: 900

  openproject:
    app_index: 1
    fixed_port: 6047
    container_port: 80
    start: "docker run -d --name {container} -p {port}:80 -e OPENPROJECT_HOST__NAME={hostname}:{port} -e OPENPROJECT_HTTPS=false -e SECRET_KEY_BASE=secret mw-openproject:latest"
    health_path: "/health_checks/default"
    startup_wait: 360

  metabase:
    app_index: 2
    fixed_port: 6100
    container_port: 80
    start: "docker run -d --name {container} -p {port}:80 mw-metabase:latest"
    health_path: "/"
    startup_wait: 180

  baserow:
    app_index: 3
    fixed_port: 6009
    container_port: 6806
    pg_port_offset: 15  # Expose internal Postgres: pg_port = port + 15 (must stay within slot_offset=20)
    start: "docker run -d --name {container} -p {port}:6806 -p {pg_port}:5432 -e BASEROW_PUBLIC_URL=http://{hostname}:{port} mw-baserow:latest"
    health_path: "/login"
    startup_wait: 600

  # -- Business Operations & Finance ----------------------------------------

  twenty:
    app_index: 4
    fixed_port: 6039
    container_port: 3000
    start: "docker run -d --name {container} -p {port}:3000 -e SERVER_URL=http://{hostname}:{port} mw-twenty:latest"
    health_path: "/"
    startup_wait: 360

  bigcapital:
    app_index: 5
    fixed_port: 6068
    container_port: 80
    start: "docker run -d --name {container} -p {port}:80 mw-bigcapital:latest"
    health_path: "/"
    startup_wait: 180

  hrms:
    app_index: 6
    fixed_port: 6077
    container_port: 8000
    start: "docker run -d --name {container} -p {port}:8000 mw-hrms:latest"
    health_path: "/"
    startup_wait: 1200

  pretix:
    app_index: 7
    fixed_port: 6089
    start_type: compose
    compose_template_file: docker/pretix.yml.tpl
    compose_volumes:
      - -data
      - -db-data
      - -redis-data
    health_path: "/control/login/"
    startup_wait: 600

  # -- Healthcare Administration ---------------------------------------------

  openemr:
    app_index: 8
    fixed_port: 6085
    container_port: 80
    start: "docker run -d --name {container} -p {port}:80 mw-openemr:latest"
    health_path: "/interface/login/login.php?site=default"
    startup_wait: 1200

  opnform:
    app_index: 9
    fixed_port: 6046
    container_port: 8080
    start: "docker run -d --name {container} -p {port}:8080 -e APP_URL=http://{hostname}:{port} mw-opnform:latest"
    health_path: "/"
    startup_wait: 120

  # -- Team Collaboration & Document Workflow --------------------------------

  onlyoffice:
    app_index: 10
    fixed_port: 6027
    start_type: compose
    compose_template_file: docker/onlyoffice.yml.tpl
    compose_volumes:
      - _mysql_data
      - _es_data
      - _community_data
      - _community_logs
      - _community_letsencrypt
      - _ds_data
      - _ds_logs
      - _ds_cache
      - _ds_files
      - _ds_fonts
    health_path: "/"
    startup_wait: 180

  mattermost:
    app_index: 11
    fixed_port: 6002
    start_type: compose
    compose_template_file: docker/mattermost.yml.tpl
    compose_volumes:
      - -config
      - -data
      - -logs
      - -plugins
      - -client-plugins
      - -bleve-indexes
      - -pg-data
    health_path: "/api/v4/system/ping"
    startup_wait: 360

  owncloud:
    app_index: 12
    fixed_port: 6018
    start_type: compose
    compose_template_file: docker/owncloud.yml.tpl
    compose_volumes: []
    health_path: "/status.php"
    startup_wait: 180

  roundcubemail:
    app_index: 13
    fixed_port: 7101
    container_port: 80
    start: "docker run -d --name {container} -p {port}:80 mw-roundcubemail:latest"
    health_path: "/"
    startup_wait: 120

  # -- Agriculture / Media New Apps --------------------------------------------------

  grocy:
