    start: "docker run -d --name {container} -p {port}:8078 -e RECIPYA_SERVER_URL=http://{hostname}:{port} mw-recipya:latest"
    health_path: "/"
    startup_wait: 60

  farmos:
    app_index: 16
    fixed_port: 7038
